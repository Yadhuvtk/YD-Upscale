name: finetune_gan_x4_v1
model_type: RRDBGAN
scale: 4
use_amp: true

datasets:
  train:
    name: ArtText_Train
    type: PairedDataset
    dataroot_hr: data/raw/train_hr
    manifest_file: data/manifests/train.txt
    patch_size: 256
    batch_size: 8
    num_workers: 8
    use_shuffle: true
    degradations:
      resize_range: [0.5, 1.2]
      blur_prob: 0.5
      blur_sigma: [0.2, 1.5]
      noise_prob: 0.5
      noise_range: [1.0, 15.0]
      jpeg_prob: 0.8
      jpeg_range: [60, 95]

network_g:
  type: RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  pretrained_path: checkpoints/pretrain/net_g_latest.pth

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64

train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [50000, 100000, 200000, 300000]
    gamma: 0.5
  total_iter: 400000
  warmup_iter: -1

  losses:
    pixel_opt:
      type: L1Loss
      loss_weight: 1e-2
    perceptual_opt:
      type: PerceptualLoss
      layer_weights:
        'conv5_4': 1  # VGG19
      vgg_type: vgg19
      use_input_norm: true
      perceptual_weight: 1.0
      style_weight: 0
    gan_opt:
      type: GANLoss
      gan_type: vanilla
      real_label_val: 1.0
      fake_label_val: 0.0
      loss_weight: !!float 1e-1

logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: true
  wandb: false
